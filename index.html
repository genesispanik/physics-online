<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Технические работы | PanikPhysics</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0f0f1b;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 500px;
      padding: 40px 20px;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 16px;
      color: #fbbf24;
    }
    p {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #e0e0ff;
      margin-bottom: 24px;
    }
    .timer {
      font-size: 2.5rem;
      font-weight: bold;
      color: #60a5fa;
      margin: 20px 0;
      text-shadow: 0 0 10px rgba(96, 165, 250, 0.5);
    }
    .footer {
      margin-top: 30px;
      font-size: 0.9rem;
      color: #a0a0c0;
    }
    .footer a {
      color: #60a5fa;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚙️ Технические работы</h1>
    <p>Мы обновляем сайт, чтобы сделать его ещё лучше.<br>Пожалуйста, подождите немного.</p>
    
    <div class="timer" id="countdown">30:00</div>
    
    <p>Сайт станет доступен автоматически после окончания таймера.</p>
    
    <div class="footer">
      Есть вопросы? Пишите нам:<br>
      <a href="https://t.me/genesischats" target="_blank">Telegram чат</a> | 
      <a href="https://max.ru/join/ouN_swD1KxEk2yxrfDSZ9ZJ7bsnMioDRIlJpbavTCns" target="_blank">MAX чат</a>
    </div>
  </div>

  <script>
    // Устанавливаем время окончания: текущее время + 30 минут
    const endTime = new Date().getTime() + 30 * 60 * 1000;

    function updateTimer() {
      const now = new Date().getTime();
      const distance = endTime - now;

      if (distance < 0) {
        document.getElementById("countdown").innerHTML = "Готово!";
        // Можно добавить редирект или сообщение о завершении
        return;
      }

      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById("countdown").innerHTML = 
        `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }

    // Обновляем каждую секунду
    setInterval(updateTimer, 1000);
    updateTimer(); // Запускаем сразу
  </script>
</body>
</html>
