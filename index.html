        });
        tasks.push({
          q: "Легковой автомобиль (1000 кг) и грузовик движутся с одинаковой скоростью. Импульс грузовика в 3 раза больше. Какова масса грузовика?",
          opts: ["2000 кг", "2500 кг", "3000 кг", "3500 кг"],
          ans: 2
        });
      }

      return tasks.length > 0 ? tasks : [{
        q: "Задачи по этой теме временно недоступны.",
        opts: ["Понятно"],
        ans: 0
      }];
    }

    function renderTopics(tabKey) {
      const container = document.getElementById('topics-container');
      const sectionTitle = document.getElementById('section-title');
      const data = topicsData[tabKey];
      
      sectionTitle.textContent = data.title;
      container.innerHTML = '';

      // === ИЗМЕНЕНИЕ: Проверка на вкладку ОГЭ ===
      if (tabKey === 'oge') {
        container.innerHTML = `
          <div class="maintenance-card">
            <div class="maintenance-icon"><i class="fas fa-tools"></i></div>
            <div class="maintenance-title">Раздел закрыт на техническое обслуживание</div>
            <div class="maintenance-text">
              Мы обновляем базу заданий ОГЭ, чтобы сделать её ещё лучше.<br>
              Пожалуйста, попробуйте позже.
            </div>
          </div>
        `;
        return; // Прерываем функцию, чтобы не рендерить обычные карточки
      }

      // Стандартный рендеринг для остальных вкладок
      data.topics.forEach(topic => {
        const card = document.createElement('div');
        card.className = 'topic-card';
        card.innerHTML = `
          <div class="topic-header">
            <div class="topic-info">
              <h3>${topic.name}</h3>
              <p>${topic.desc}</p>
            </div>
            <button class="start-link" data-topic="${topic.id}">Начать обучение</button>
          </div>
        `;
        container.appendChild(card);
      });
      document.querySelectorAll('.start-link').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const topicId = e.target.dataset.topic;
          openPresentation(topicId, tabKey);
        });
      });
    }

    function openPresentation(topicId, tabKey) {
      currentTabKey = tabKey;
      const originalTopic = topicsData[tabKey].topics.find(t => t.id === topicId);
      currentTopic = JSON.parse(JSON.stringify(originalTopic));
      currentTopic.tasks = generateTasks(topicId);
      currentSlide = 0;
      userAnswers = {};
      isTopicVerified = false;
      renderModalContent();
      document.getElementById('presentation-modal').classList.add('active');
    }

    function renderMath() {
      if (typeof MathJax !== 'undefined' && MathJax.typeset) {
        MathJax.typeset();
      }
    }

    function renderModalContent() {
      const modalTitle = document.getElementById('modal-topic-title');
      const modalBody = document.getElementById('modal-body');
      modalTitle.textContent = currentTopic.name;

      if (currentSlide < currentTopic.slides.length) {
        modalBody.innerHTML = `
          <div class="slide-text">${currentTopic.slides[currentSlide]}</div>
          <div class="modal-actions">
            ${currentSlide > 0 ? '<button class="modal-btn prev-btn" id="prev-slide">Назад</button>' : ''}
            <button class="modal-btn next-btn" id="next-slide">
              ${currentSlide === currentTopic.slides.length - 1 ? 'Формулы и задачи' : 'Далее'}
            </button>
          </div>
        `;
        renderMath();
      } else {
        let tasksHtml = '';

        if (currentTopic.formulaInfo) {
          tasksHtml += currentTopic.formulaInfo;
        }

        currentTopic.tasks.forEach((task, idx) => {
          // Показываем результат только если тема проверена
          const score = isTopicVerified && userAnswers[idx] !== undefined && userAnswers[idx] === task.ans ? 5 : 0;
          
          tasksHtml += `
            <div style="margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.05);">
              <div class="task-question">${task.q}</div>
              <div class="task-options" id="task-${idx}-options">
                ${task.opts.map((opt, i) => `
                  <label class="task-option">
                    <input type="radio" name="task-${idx}" value="${i}" ${userAnswers[idx] === i ? 'checked' : ''} ${isTopicVerified ? 'disabled' : ''}>
                    ${opt}
                  </label>
                `).join('')}
              </div>
              ${score > 0 ? `<div class="score-badge"><i class="fas fa-check-circle"></i> Верно! +5 баллов</div>` : 
                (isTopicVerified ? `<div style="color: #ef4444; margin-top:8px;"><i class="fas fa-times-circle"></i> Неверно</div>` : '')}
            </div>
          `;
        });

        let nextButton = '';
        const currentTabIndex = topicsData[currentTabKey].topics.findIndex(t => t.id === currentTopic.id);
        if (currentTabIndex < topicsData[currentTabKey].topics.length - 1) {
          const nextTopic = topicsData[currentTabKey].topics[currentTabIndex + 1];
          nextButton = `<button class="modal-btn next-topic-btn" id="next-topic">Продолжить: ${nextTopic.name}</button>`;
        } else {
          nextButton = `<button class="modal-btn restart-btn" id="restart-topic">Начать заново</button>`;
        }

        let actionButtons;
        if (isTopicVerified) {
          actionButtons = `
            <button class="modal-btn close-topic-btn" id="close-topic">Закрыть тему</button>
            ${nextButton}
          `;
        } else {
          actionButtons = `<button class="modal-btn check-btn" id="check-answers">Проверить ответы</button>`;
        }

        modalBody.innerHTML = tasksHtml + `
          <div class="modal-actions">
            ${actionButtons}
          </div>
        `;
        renderMath();

        // === КЛЮЧЕВОЕ ИСПРАВЛЕНИЕ: Слушатель событий на радио-кнопки ===
        const radioInputs = modalBody.querySelectorAll('input[type="radio"]');
        radioInputs.forEach(input => {
            input.addEventListener('change', (e) => {
                const name = e.target.name; // task-0, task-1...
                const index = parseInt(name.split('-')[1]);
                const value = parseInt(e.target.value);
                userAnswers[index] = value;
                console.log(`Ответ сохранен: Вопрос ${index}, Вариант ${value}`); // Для отладки
            });
        });
      }

      // Обработчики кнопок
      document.getElementById('prev-slide')?.addEventListener('click', () => {
        currentSlide--;
        renderModalContent();
      });
      
      document.getElementById('next-slide')?.addEventListener('click', () => {
        currentSlide++;
        renderModalContent();
      });
      
      document.getElementById('check-answers')?.addEventListener('click', () => {
        // Проверка: все ли вопросы имеют ответы?
        const totalTasks = currentTopic.tasks.length;
        const answeredCount = Object.keys(userAnswers).length;
        
        if (answeredCount < totalTasks) {
            alert(`Вы ответили не на все вопросы! (${answeredCount} из ${totalTasks})`);
            return;
        }
        
        isTopicVerified = true;
        renderModalContent();
      });
      
      document.getElementById('next-topic')?.addEventListener('click', () => {
        const currentTabIndex = topicsData[currentTabKey].topics.findIndex(t => t.id === currentTopic.id);
        const nextTopicId = topicsData[currentTabKey].topics[currentTabIndex + 1].id;
        openPresentation(nextTopicId, currentTabKey);
      });
      
      document.getElementById('restart-topic')?.addEventListener('click', () => {
        currentSlide = 0;
        userAnswers = {};
        isTopicVerified = false;
        renderModalContent();
      });

      document.getElementById('close-topic')?.addEventListener('click', () => {
        closeModal();
      });
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const tab = btn.dataset.tab;
        renderTopics(tab);
      });
    });

    document.getElementById('close-modal').addEventListener('click', () => {
      closeModal();
    });

    function closeModal() {
      document.getElementById('presentation-modal').classList.remove('active');
      isTopicVerified = false;
    }

    renderTopics('physics7');
  </script>
</body>
</html>
